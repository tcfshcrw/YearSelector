<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>考題年份抽選</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 新增：引入 PDF.js 核心庫，用以接管 iOS 的 PDF 渲染 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="考題抽選">
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4 font-sans selection:bg-blue-200">
    
    <!-- 更新：PDF 預覽彈出視窗 (Modal) 改為使用 PDF.js 渲染的容器，移除備用按鈕 -->
    <div id="pdfModal" class="fixed inset-0 bg-black/95 z-50 hidden flex-col backdrop-blur-md">
        <div class="flex justify-between items-center p-4 bg-gray-900 text-white shadow-lg shrink-0">
            <h2 id="modalTitle" class="text-lg font-bold tracking-wider truncate flex-1 pr-4">PDF 預覽</h2>
            <button id="closeModalBtn" class="text-gray-300 hover:text-white bg-gray-800 hover:bg-red-500 rounded-full w-8 h-8 flex items-center justify-center transition-colors text-xl font-bold">&times;</button>
        </div>
        
        <!-- 用來滾動的區域 -->
        <div class="w-full flex-1 relative overflow-auto bg-gray-800" style="-webkit-overflow-scrolling: touch;">
            <!-- 載入中動畫 -->
            <div id="pdfLoading" class="absolute inset-0 flex flex-col items-center justify-center text-white hidden z-10 bg-gray-800/80">
                <div class="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                <div class="font-bold tracking-widest text-lg">載入試題中...</div>
            </div>
            
            <!-- 放置每一頁 Canvas 的容器 -->
            <div id="pdfContainer" class="flex flex-col items-center p-4 gap-4 w-full"></div>
        </div>
    </div>

    <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-sm">
        <h1 class="text-2xl font-bold text-center mb-8 text-gray-800">考題年份抽選器</h1>
        
        <div class="flex gap-4 mb-6">
            <div class="flex-1">
                <label for="startYear" class="block text-sm font-semibold text-gray-600 mb-2">起始年份</label>
                <input type="number" id="startYear" class="w-full border border-gray-300 rounded-xl p-3 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition text-center text-lg" value="100">
            </div>
            <div class="flex-1">
                <label for="endYear" class="block text-sm font-semibold text-gray-600 mb-2">結束年份</label>
                <input type="number" id="endYear" class="w-full border border-gray-300 rounded-xl p-3 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition text-center text-lg" value="112">
            </div>
        </div>

        <button id="drawBtn" class="w-full bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-bold py-4 rounded-xl shadow-md hover:shadow-lg transition-all duration-200 mb-8 text-lg flex justify-center items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
            開始抽選
        </button>

        <div>
            <label for="result" class="block text-sm font-semibold text-gray-600 mb-2 text-center">抽選結果</label>
            <input type="text" id="result" class="w-full border-2 border-blue-100 rounded-xl p-4 text-center text-3xl font-extrabold text-blue-600 bg-blue-50 outline-none transition-colors" readonly placeholder="---">
        </div>

        <!-- 更新：將 <a> 標籤改為 <button>，以配合內嵌顯示邏輯 -->
        <div id="pdfLinks" class="grid grid-cols-2 gap-3 mt-4 hidden">
            <button id="btnA" class="bg-green-500 hover:bg-green-600 text-white font-bold py-3 rounded-xl shadow transition-colors text-center">專A 試題</button>
            <button id="btnA_Ans" class="bg-teal-500 hover:bg-teal-600 text-white font-bold py-3 rounded-xl shadow transition-colors text-center">專A 解答</button>
            <button id="btnB" class="col-span-2 bg-purple-500 hover:bg-purple-600 text-white font-bold py-3 rounded-xl shadow transition-colors text-center">專B 試題</button>
        </div>
        
        <div id="errorMsg" class="text-red-500 text-sm text-center mt-4 hidden"></div>

        <button id="clearBtn" class="mt-4 text-sm text-gray-400 hover:text-red-500 underline w-full text-center transition-colors outline-none focus:text-red-500">清除已抽選紀錄</button>
    </div>

    <script>
        // 核心抽選邏輯
        const drawBtn = document.getElementById('drawBtn');
        const startYearInput = document.getElementById('startYear');
        const endYearInput = document.getElementById('endYear');
        const resultInput = document.getElementById('result');
        const errorMsg = document.getElementById('errorMsg');
        const clearBtn = document.getElementById('clearBtn'); // 新增清除紀錄按鈕
        
        // 更新：連結元素參考改為按鈕
        const pdfLinksContainer = document.getElementById('pdfLinks');
        const btnA = document.getElementById('btnA');
        const btnA_Ans = document.getElementById('btnA_Ans');
        const btnB = document.getElementById('btnB');

        // 更新：Modal 與 PDF.js 渲染元素參考
        const pdfModal = document.getElementById('pdfModal');
        const pdfContainer = document.getElementById('pdfContainer');
        const pdfLoading = document.getElementById('pdfLoading');
        const modalTitle = document.getElementById('modalTitle');
        const closeModalBtn = document.getElementById('closeModalBtn');

        // 設定 PDF.js Worker 路徑
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        let isDrawing = false;
        let currentTargetYear = null; // 紀錄當前抽到的年份
        
        // 狀態管理與 LocalStorage
        const STORAGE_KEY = 'examDrawState';
        let appState = {
            startYear: 100,
            endYear: 112,
            drawnYears: []
        };

        function loadState() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                try {
                    appState = JSON.parse(saved);
                    startYearInput.value = appState.startYear || 100;
                    endYearInput.value = appState.endYear || 112;
                    if (!appState.drawnYears) appState.drawnYears = [];
                } catch(e) {
                    console.error('讀取紀錄失敗', e);
                }
            }
        }

        function saveState() {
            appState.startYear = parseInt(startYearInput.value, 10);
            appState.endYear = parseInt(endYearInput.value, 10);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(appState));
        }

        // 監聽鍵盤輸入與數值改變，即時儲存
        startYearInput.addEventListener('input', saveState);
        endYearInput.addEventListener('input', saveState);

        // 點擊清除紀錄
        clearBtn.addEventListener('click', () => {
            appState.drawnYears = [];
            saveState();
            resultInput.value = "---";
            resultInput.classList.remove('text-red-600', 'border-red-200', 'bg-red-50');
            resultInput.classList.add('text-blue-600', 'border-blue-100', 'bg-blue-50');
            pdfLinksContainer.classList.add('hidden'); // 隱藏連結
            alert('抽選紀錄已清除');
        });

        // 初始化讀取
        loadState();

        // 更新：開啟 PDF Modal 並使用 PDF.js 渲染
        async function openPdfModal(title, src) {
            modalTitle.textContent = title;
            pdfModal.classList.remove('hidden');
            pdfModal.classList.add('flex');
            document.body.style.overflow = 'hidden'; // 防止背景滾動
            
            // 清空先前的畫面並顯示載入中
            pdfContainer.innerHTML = '';
            pdfLoading.classList.remove('hidden');

            try {
                // 取得 PDF 文件
                const loadingTask = pdfjsLib.getDocument(src);
                const pdf = await loadingTask.promise;
                
                // 依序渲染 PDF 的每一頁
                for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
                    const page = await pdf.getPage(pageNum);
                    
                    // 設定渲染縮放比例 (兼顧解析度與記憶體)
                    const viewport = page.getViewport({ scale: 1.5 });
                    
                    // 建立 Canvas 畫布
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;
                    
                    // Tailwind 樣式：滿版寬度、自適應高度，產生像是 A4 紙張的陰影效果
                    canvas.className = 'w-full h-auto max-w-4xl bg-white shadow-xl rounded-md';
                    
                    pdfContainer.appendChild(canvas);

                    const renderContext = {
                        canvasContext: ctx,
                        viewport: viewport
                    };
                    
                    // 等待該頁面渲染完畢
                    await page.render(renderContext).promise;
                }
            } catch (error) {
                console.error('PDF 載入失敗', error);
                pdfContainer.innerHTML = `
                    <div class="text-red-300 bg-red-900/50 border border-red-500/50 px-6 py-4 rounded-xl text-center mt-10">
                        無法載入 PDF 或找不到對應檔案。<br>
                        <span class="text-sm opacity-75 mt-2 block">請確認路徑：${src}</span>
                    </div>`;
            } finally {
                pdfLoading.classList.add('hidden'); // 隱藏載入中提示
            }
        }

        // 更新：關閉 PDF Modal 並釋放記憶體
        closeModalBtn.addEventListener('click', () => {
            pdfModal.classList.add('hidden');
            pdfModal.classList.remove('flex');
            pdfContainer.innerHTML = ''; // 清空 Canvas 以釋放記憶體資源
            document.body.style.overflow = ''; // 恢復背景滾動
        });

        // 綁定按鈕點擊事件，開啟內嵌 PDF
        btnA.addEventListener('click', () => openPdfModal(`${currentTargetYear}年 - 專A 試題`, `./pdfs/${currentTargetYear}-1.pdf`));
        btnA_Ans.addEventListener('click', () => openPdfModal(`${currentTargetYear}年 - 專A 解答`, `./pdfs/${currentTargetYear}-1-1.pdf`));
        btnB.addEventListener('click', () => openPdfModal(`${currentTargetYear}年 - 專B 試題`, `./pdfs/${currentTargetYear}-2.pdf`));

        drawBtn.addEventListener('click', () => {
            if (isDrawing) return;
            
            errorMsg.classList.add('hidden');
            const start = parseInt(startYearInput.value, 10);
            const end = parseInt(endYearInput.value, 10);

            // 簡單的驗證
            if (isNaN(start) || isNaN(end)) {
                showError("請輸入有效的數字");
                return;
            }
            if (start > end) {
                showError("起始年份不能大於結束年份");
                return;
            }

            isDrawing = true;
            drawBtn.classList.add('opacity-75', 'cursor-not-allowed');
            pdfLinksContainer.classList.add('hidden'); // 開始抽選時隱藏連結
            
            // 每次抽選前恢復預設顏色
            resultInput.classList.remove('text-red-600', 'border-red-200', 'bg-red-50');
            resultInput.classList.add('text-blue-600', 'border-blue-100', 'bg-blue-50');
            
            const targetYear = Math.floor(Math.random() * (end - start + 1)) + start;
            
            // 轉動動畫效果
            let rolls = 0;
            const maxRolls = 15;
            const rollInterval = setInterval(() => {
                const randomTemp = Math.floor(Math.random() * (end - start + 1)) + start;
                resultInput.value = randomTemp;
                rolls++;
                
                if (rolls >= maxRolls) {
                    clearInterval(rollInterval);
                    
                    if (appState.drawnYears.includes(targetYear)) {
                        resultInput.value = `${targetYear} (已抽取過)`;
                        // 若已抽取過，變更樣式為紅色提醒
                        resultInput.classList.remove('text-blue-600', 'border-blue-100', 'bg-blue-50');
                        resultInput.classList.add('text-red-600', 'border-red-200', 'bg-red-50');
                    } else {
                        resultInput.value = targetYear;
                        // 紀錄至陣列並儲存 JSON
                        appState.drawnYears.push(targetYear);
                        saveState();
                    }
                    
                    // 紀錄當前年份並顯示按鈕
                    currentTargetYear = targetYear;
                    pdfLinksContainer.classList.remove('hidden');

                    isDrawing = false;
                    drawBtn.classList.remove('opacity-75', 'cursor-not-allowed');
                }
            }, 50);
        });

        function showError(message) {
            errorMsg.textContent = message;
            errorMsg.classList.remove('hidden');
            resultInput.value = "---";
            pdfLinksContainer.classList.add('hidden'); // 發生錯誤時隱藏連結
        }

        // 動態生成 PWA Manifest 與 Service Worker 以符合單一檔案需求
        const setupPWA = () => {
            // 生成一個簡單的 SVG Icon 用於 PWA
            const iconSvg = `<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect width='512' height='512' rx='112' fill='%232563eb'/><text x='256' y='320' font-size='200' font-family='sans-serif' font-weight='bold' text-anchor='middle' fill='white'>抽</text></svg>`;
            const iconUrl = 'data:image/svg+xml;utf8,' + encodeURIComponent(iconSvg);

            // 動態注入 Apple Touch Icon
            const appleIcon = document.createElement('link');
            appleIcon.rel = 'apple-touch-icon';
            appleIcon.href = iconUrl;
            document.head.appendChild(appleIcon);

            // 建立 Manifest
            const manifest = {
                name: "考題年份抽選",
                short_name: "考題抽選",
                description: "一個簡單的考題年份隨機抽選工具",
                start_url: location.href,
                display: "standalone",
                background_color: "#f3f4f6",
                theme_color: "#2563eb",
                icons: [
                    {
                        src: iconUrl,
                        sizes: "512x512",
                        type: "image/svg+xml",
                        purpose: "any maskable"
                    }
                ]
            };

            const manifestBlob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
            const manifestUrl = URL.createObjectURL(manifestBlob);
            const link = document.createElement('link');
            link.rel = 'manifest';
            link.href = manifestUrl;
            document.head.appendChild(link);

            // 註冊基礎的 Service Worker
            if ('serviceWorker' in navigator) {
                const swCode = `
                    self.addEventListener('install', (e) => self.skipWaiting());
                    self.addEventListener('activate', (e) => e.waitUntil(clients.claim()));
                    self.addEventListener('fetch', (e) => {
                        // 離線快取邏輯可以加在這裡，目前採用預設網路請求
                    });
                `;
                const swBlob = new Blob([swCode], { type: 'application/javascript' });
                const swUrl = URL.createObjectURL(swBlob);
                navigator.serviceWorker.register(swUrl).catch(err => console.log('Service Worker 註冊失敗', err));
            }
        };

        // 啟動 PWA 設置
        setupPWA();
    </script>
</body>
</html>
