<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>考題年份抽選</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 引入 PDF.js 核心庫，用以接管 iOS 的 PDF 渲染 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="考題抽選">
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4 font-sans selection:bg-blue-200">
    
    <!-- PDF 預覽彈出視窗 (Modal) -->
    <div id="pdfModal" class="fixed inset-0 bg-black/95 z-50 hidden flex-col backdrop-blur-md">
        <div class="flex justify-between items-center p-4 bg-gray-900 text-white shadow-lg shrink-0">
            <h2 id="modalTitle" class="text-lg font-bold tracking-wider truncate flex-1 pr-4">PDF 預覽</h2>
            <button id="closeModalBtn" class="text-gray-300 hover:text-white bg-gray-800 hover:bg-red-500 rounded-full w-8 h-8 flex items-center justify-center transition-colors text-xl font-bold">&times;</button>
        </div>
        
        <!-- 用來滾動的區域 -->
        <div class="w-full flex-1 relative overflow-auto bg-gray-800" style="-webkit-overflow-scrolling: touch;">
            <!-- 載入中動畫 -->
            <div id="pdfLoading" class="absolute inset-0 flex flex-col items-center justify-center text-white hidden z-10 bg-gray-800/80">
                <div class="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                <div class="font-bold tracking-widest text-lg">載入試題中...</div>
            </div>
            
            <!-- 放置每一頁 Canvas 的容器 -->
            <div id="pdfContainer" class="flex flex-col items-center p-4 gap-4 w-full"></div>
        </div>
    </div>

    <!-- 主介面 -->
    <div class="bg-white rounded-3xl shadow-xl p-8 w-full max-w-sm border border-gray-50">
        <h1 class="text-2xl font-bold text-center mb-8 text-gray-800 tracking-wide">考題年份抽選器</h1>
        
        <div class="flex gap-4 mb-6">
            <div class="flex-1">
                <label for="startYear" class="block text-sm font-semibold text-gray-500 mb-2">起始年份</label>
                <input type="number" id="startYear" class="w-full bg-gray-50 border border-gray-200 rounded-xl p-3 focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-center text-lg font-medium" value="100">
            </div>
            <div class="flex-1">
                <label for="endYear" class="block text-sm font-semibold text-gray-500 mb-2">結束年份</label>
                <input type="number" id="endYear" class="w-full bg-gray-50 border border-gray-200 rounded-xl p-3 focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-center text-lg font-medium" value="112">
            </div>
        </div>

        <button id="drawBtn" class="w-full bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-bold py-4 rounded-xl shadow-md hover:shadow-lg hover:-translate-y-0.5 transition-all duration-200 mb-8 text-lg flex justify-center items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
            開始抽選
        </button>

        <div>
            <label for="result" class="block text-sm font-semibold text-gray-500 mb-2 text-center">抽選結果</label>
            <input type="text" id="result" class="w-full border-2 border-blue-100 rounded-xl p-4 text-center text-3xl font-extrabold text-blue-600 bg-blue-50/50 outline-none transition-colors" readonly placeholder="---">
        </div>

        <!-- 考卷開啟按鈕區 -->
        <div id="pdfLinks" class="grid grid-cols-2 gap-3 mt-4 hidden">
            <button id="btnA" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 rounded-xl shadow transition-colors text-center text-sm">專A 試題</button>
            <button id="btnA_Ans" class="bg-teal-500 hover:bg-teal-600 text-white font-bold py-3 rounded-xl shadow transition-colors text-center text-sm">專A 解答</button>
            <button id="btnB" class="col-span-2 bg-purple-500 hover:bg-purple-600 text-white font-bold py-3 rounded-xl shadow transition-colors text-center text-sm">專B 試題</button>
        </div>

        <!-- 完成進度勾選區 -->
        <div id="completionCheckboxes" class="flex justify-center gap-6 mt-5 hidden">
            <label class="flex items-center gap-2 text-gray-700 font-semibold cursor-pointer select-none">
                <input type="checkbox" id="checkA" class="w-5 h-5 text-blue-600 rounded border-gray-300 focus:ring-blue-500">
                專A 已完成
            </label>
            <label class="flex items-center gap-2 text-gray-700 font-semibold cursor-pointer select-none">
                <input type="checkbox" id="checkB" class="w-5 h-5 text-blue-600 rounded border-gray-300 focus:ring-blue-500">
                專B 已完成
            </label>
        </div>
        
        <div id="errorMsg" class="text-red-500 text-sm text-center mt-4 font-medium hidden"></div>

        <button id="clearBtn" class="mt-6 text-sm text-gray-400 hover:text-red-500 underline w-full text-center transition-colors outline-none focus:text-red-500">清除所有完成紀錄</button>
    </div>

    <script>
        // ==========================================
        // 核心抽選邏輯與狀態管理
        // ==========================================
        const drawBtn = document.getElementById('drawBtn');
        const startYearInput = document.getElementById('startYear');
        const endYearInput = document.getElementById('endYear');
        const resultInput = document.getElementById('result');
        const errorMsg = document.getElementById('errorMsg');
        const clearBtn = document.getElementById('clearBtn'); 
        
        const pdfLinksContainer = document.getElementById('pdfLinks');
        const btnA = document.getElementById('btnA');
        const btnA_Ans = document.getElementById('btnA_Ans');
        const btnB = document.getElementById('btnB');

        const completionCheckboxes = document.getElementById('completionCheckboxes');
        const checkA = document.getElementById('checkA');
        const checkB = document.getElementById('checkB');

        let isDrawing = false;
        let currentTargetYear = null; 
        
        const STORAGE_KEY = 'examDrawState';
        // 狀態改為記錄完成狀態 completed: { "年份": { a: true/false, b: true/false } }
        let appState = {
            startYear: 100,
            endYear: 112,
            completed: {} 
        };

        function loadState() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                try {
                    const parsedState = JSON.parse(saved);
                    appState.startYear = parsedState.startYear || 100;
                    appState.endYear = parsedState.endYear || 112;
                    appState.completed = parsedState.completed || {};
                    
                    startYearInput.value = appState.startYear;
                    endYearInput.value = appState.endYear;
                } catch(e) {
                    console.error('讀取紀錄失敗', e);
                }
            }
        }

        function saveState() {
            appState.startYear = parseInt(startYearInput.value, 10);
            appState.endYear = parseInt(endYearInput.value, 10);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(appState));
        }

        // 監聽勾選框變更，即時存入 JSON
        function handleCheckboxChange() {
            if (!currentTargetYear) return;
            if (!appState.completed[currentTargetYear]) {
                appState.completed[currentTargetYear] = { a: false, b: false };
            }
            appState.completed[currentTargetYear].a = checkA.checked;
            appState.completed[currentTargetYear].b = checkB.checked;
            saveState();
        }

        checkA.addEventListener('change', handleCheckboxChange);
        checkB.addEventListener('change', handleCheckboxChange);

        startYearInput.addEventListener('input', saveState);
        endYearInput.addEventListener('input', saveState);

        clearBtn.addEventListener('click', () => {
            if(confirm('確定要清除所有年份的完成紀錄嗎？')) {
                appState.completed = {};
                saveState();
                resultInput.value = "---";
                pdfLinksContainer.classList.add('hidden');
                completionCheckboxes.classList.add('hidden');
                alert('完成紀錄已清除');
            }
        });

        loadState();

        drawBtn.addEventListener('click', () => {
            if (isDrawing) return;
            
            errorMsg.classList.add('hidden');
            const start = parseInt(startYearInput.value, 10);
            const end = parseInt(endYearInput.value, 10);

            if (isNaN(start) || isNaN(end)) {
                showError("請輸入有效的數字");
                return;
            }
            if (start > end) {
                showError("起始年份不能大於結束年份");
                return;
            }

            // 過濾出尚未「全部完成」的年份
            const validYears = [];
            for (let y = start; y <= end; y++) {
                const status = appState.completed[y] || { a: false, b: false };
                // 只要 A 沒完成，或 B 沒完成，就加入抽選池
                if (!(status.a && status.b)) {
                    validYears.push(y);
                }
            }

            if (validYears.length === 0) {
                showError("此區間內的所有年份皆已完成！");
                return;
            }

            isDrawing = true;
            drawBtn.classList.add('opacity-75', 'cursor-not-allowed');
            pdfLinksContainer.classList.add('hidden'); 
            completionCheckboxes.classList.add('hidden');
            
            resultInput.classList.remove('text-red-600', 'border-red-200', 'bg-red-50');
            resultInput.classList.add('text-blue-600', 'border-blue-100', 'bg-blue-50/50');
            
            // 從過濾後的池子中抽出目標年份
            const targetYear = validYears[Math.floor(Math.random() * validYears.length)];
            
            let rolls = 0;
            const maxRolls = 15;
            const rollInterval = setInterval(() => {
                // 動畫期間僅供視覺效果，隨機跳動區間內的數字
                const randomTemp = Math.floor(Math.random() * (end - start + 1)) + start;
                resultInput.value = randomTemp;
                rolls++;
                
                if (rolls >= maxRolls) {
                    clearInterval(rollInterval);
                    
                    resultInput.value = targetYear;
                    currentTargetYear = targetYear;

                    // 載入該年份的勾選狀態並顯示
                    const currentStatus = appState.completed[targetYear] || { a: false, b: false };
                    checkA.checked = currentStatus.a;
                    checkB.checked = currentStatus.b;

                    pdfLinksContainer.classList.remove('hidden');
                    completionCheckboxes.classList.remove('hidden');

                    isDrawing = false;
                    drawBtn.classList.remove('opacity-75', 'cursor-not-allowed');
                }
            }, 50);
        });

        function showError(message) {
            errorMsg.textContent = message;
            errorMsg.classList.remove('hidden');
            resultInput.value = "---";
            pdfLinksContainer.classList.add('hidden'); 
            completionCheckboxes.classList.add('hidden');
        }

        // ==========================================
        // PDF.js 預覽邏輯
        // ==========================================
        const pdfModal = document.getElementById('pdfModal');
        const pdfContainer = document.getElementById('pdfContainer');
        const pdfLoading = document.getElementById('pdfLoading');
        const modalTitle = document.getElementById('modalTitle');
        const closeModalBtn = document.getElementById('closeModalBtn');

        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        async function openPdfModal(title, src) {
            modalTitle.textContent = title;
            pdfModal.classList.remove('hidden');
            pdfModal.classList.add('flex');
            document.body.style.overflow = 'hidden'; 
            
            pdfContainer.innerHTML = '';
            pdfLoading.classList.remove('hidden');

            try {
                const response = await fetch(src);
                
                if (!response.ok) {
                    throw new Error(`檔案不存在 (${response.status})`);
                }
                
                const arrayBuffer = await response.arrayBuffer();
                const uint8Array = new Uint8Array(arrayBuffer);
                
                const loadingTask = pdfjsLib.getDocument({ data: uint8Array });
                const pdf = await loadingTask.promise;
                
                for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
                    const page = await pdf.getPage(pageNum);
                    const viewport = page.getViewport({ scale: 1.5 });
                    
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;
                    
                    canvas.className = 'w-full h-auto max-w-4xl bg-white shadow-xl rounded-md';
                    pdfContainer.appendChild(canvas);

                    await page.render({ canvasContext: ctx, viewport: viewport }).promise;
                }
            } catch (error) {
                console.error('PDF 載入失敗', error);
                pdfContainer.innerHTML = `
                    <div class="text-red-300 bg-red-900/50 border border-red-500/50 px-6 py-4 rounded-xl text-center mt-10">
                        無法載入 PDF 或找不到對應檔案。<br>
                        <span class="text-sm opacity-75 mt-2 block">請確認同資料夾下是否有此路徑：<br>${src}</span>
                    </div>`;
            } finally {
                pdfLoading.classList.add('hidden');
            }
        }

        closeModalBtn.addEventListener('click', () => {
            pdfModal.classList.add('hidden');
            pdfModal.classList.remove('flex');
            pdfContainer.innerHTML = ''; 
            document.body.style.overflow = ''; 
        });

        btnA.addEventListener('click', () => openPdfModal(`${currentTargetYear}年 - 專A 試題`, `./pdfs/${currentTargetYear}-1.pdf`));
        btnA_Ans.addEventListener('click', () => openPdfModal(`${currentTargetYear}年 - 專A 解答`, `./pdfs/${currentTargetYear}-1-1.pdf`));
        btnB.addEventListener('click', () => openPdfModal(`${currentTargetYear}年 - 專B 試題`, `./pdfs/${currentTargetYear}-2.pdf`));

        // ==========================================
        // PWA 註冊邏輯
        // ==========================================
        const setupPWA = () => {
            const iconSvg = `<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect width='512' height='512' rx='112' fill='%232563eb'/><text x='256' y='320' font-size='200' font-family='sans-serif' font-weight='bold' text-anchor='middle' fill='white'>抽</text></svg>`;
            const iconUrl = 'data:image/svg+xml;utf8,' + encodeURIComponent(iconSvg);

            const appleIcon = document.createElement('link');
            appleIcon.rel = 'apple-touch-icon';
            appleIcon.href = iconUrl;
            document.head.appendChild(appleIcon);

            const manifest = {
                name: "考題年份抽選",
                short_name: "考題抽選",
                description: "一個簡單的考題年份隨機抽選工具",
                start_url: location.href,
                display: "standalone",
                background_color: "#f3f4f6",
                theme_color: "#2563eb",
                icons: [
                    { src: iconUrl, sizes: "512x512", type: "image/svg+xml", purpose: "any maskable" }
                ]
            };

            const manifestBlob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
            const manifestUrl = URL.createObjectURL(manifestBlob);
            const link = document.createElement('link');
            link.rel = 'manifest';
            link.href = manifestUrl;
            document.head.appendChild(link);

            if ('serviceWorker' in navigator) {
                const swCode = `
                    self.addEventListener('install', (e) => self.skipWaiting());
                    self.addEventListener('activate', (e) => e.waitUntil(clients.claim()));
                    self.addEventListener('fetch', (e) => {});
                `;
                const swBlob = new Blob([swCode], { type: 'application/javascript' });
                const swUrl = URL.createObjectURL(swBlob);
                navigator.serviceWorker.register(swUrl).catch(err => console.log('SW 失敗', err));
            }
        };

        setupPWA();
    </script>
</body>
</html>
